name: Build Android APK

# Builds a sideloadable Wanderstamp APK in the cloud — no local Android toolchain
# needed. Run manually from the Actions tab after setting the 4 signing secrets
# (see app/README.md).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/src-tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('app/src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Init Android project
        run: cargo tauri android init

      - name: Build APK
        run: cargo tauri android build --apk

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -e
          BT=$(ls -d "$ANDROID_SDK_ROOT"/build-tools/* | sort -V | tail -1)
          APK=$(find src-tauri/gen/android -name "*-universal-release-unsigned.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name "*-release-unsigned.apk" | head -1)
          fi
          echo "Found APK: $APK"
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::No signing secrets set. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD (see app/make-keystore.sh)."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/hm.keystore"
          "$BT/zipalign" -f 4 "$APK" "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" sign \
            --ks "$RUNNER_TEMP/hm.keystore" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out "$RUNNER_TEMP/holiday-map.apk" \
            "$RUNNER_TEMP/aligned.apk"
          "$BT/apksigner" verify --verbose "$RUNNER_TEMP/holiday-map.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: holiday-map-apk
          path: ${{ runner.temp }}/holiday-map.apk
          if-no-files-found: error
